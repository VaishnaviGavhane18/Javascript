<!DOCTYPE html>

<script>

var str="Hello world!";
document.write(str.match("world") + "<br>");  // world
document.write(str.match("World") + "<br>"); // null 
document.write(str.match("world!"));  // world!
 

//It is case sensitive therefore the line no9 will give O/P as null because of the letter W.
</script>
