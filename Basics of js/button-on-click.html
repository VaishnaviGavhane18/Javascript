<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<script>
    function myFunction() {
        document.write("hello eveyone");
    }
</script>
</head>
<body>
    <h1> my name is vaishnavi</h1>
    <button type="button" onclick="myFunction()">Click here</button>
    <p id="myinfo">click button to see info</p>

 
 <!--IMP:
 1. (document.write) recreates the page and rewrites on it , the existing document get 
    removed or overwritten.
 2. If you use (document.write) after the document has finished loading the entire html 
    page will be overwritten. 
 3. As you can see when we click on the button everything else gets disappeared and only
    the (document.write) code runs.
-->
   
</body>
</html>
