<p>if-else-if code:</p>
<script>
function mydatefunction()
{
var x="";  // variable x declared
var time=new Date().getHours(); // new object created for Date() method to get the current hour

if (time>0 && time<=10)   // condition
  {
  x="Good morning";
  }

else if(time>10 && time<=16)  // condition
  {
  x="Good afternoon";
  }

else if(time>16 && time<=20)  // condition
  {
  x="Good day";
  }

else
  {
  x="Good evening";
  }

document.getElementById("demooo").innerHTML=x;
}
</script>

<button onclick="mydatefunction()">Try it</button>

<p id="demooo"></p>
