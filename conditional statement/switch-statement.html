<!DOCTYPE html>
<html>


<script>
function myFunction()
{
var x; //variable declaration ,dummy variable
var d=new Date().getDay(); //getDay() method returns the day of the week in no format (0-6)
switch (d)   
  {
  case 0:
    x="Today is Sunday";
    break;
  case 1:
    x="Today is Monday";
    break;
  case 2:
    x="Today is Tuesday";
    break;
  case 3:
    x="Today is Wednesday";
    break;
  case 4:
    x="Today is Thursday";
    break;
  case 5:
    x="Today is Friday";
    break;
  case 6:
    x="Today is Saturday";
    break;
  }
document.getElementById("demo").innerHTML=x;
}
</script>

<body>

<p>Click the button to display what day it is today.</p>

<button onclick="myFunction()">Try it</button>

<p id="demo"></p>

</body>
</html>
