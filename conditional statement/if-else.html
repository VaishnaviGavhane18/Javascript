<p>if-else code:</p>

<button onclick="mydfunction()">Try it</button>

<p id="demoo"></p>

<script>
function mydfunction()
{
var y="";
var time=new Date().getHours();
if (time<20)
  {
  y="Good day";
  }
else
  {
  y="Good evening";
  }
document.getElementById("demoo").innerHTML=y;
}
