<!-----------------------------------------------------------------------------------------
 Continue Statement :
 ------------------------------------------------------------------------------------------
 
 * USE :
 Ans: when we want to skip a particular iteration in a loop we use continue statement.
 

 * IMPORTANT NOTE:
  1.] Always use break and continue together because the code continues to execute by
      skipping some parts and if we use only break the code stops .

 (Syntax):
 continue;
 
 Example:
 ------------------------------------------------------------------------------------------>

<!DOCTYPE html>
<html>
<body>

<p>Click the button </p>
<button onclick="myFunction()">Try it</button>
<p id="demo" style="width: 600px;word-wrap: break-word;text-overflow: auto;"></p>

<script>
function myFunction()
{
var x="", i=0;
for (i=1; i<=100; i++)
  {
  if (i%2==0)
    {
    continue;
    }
  x = x +  i + "<br>";
  }
document.getElementById("demo").innerHTML=x;
}
</script>

<!--
EXPLANATION:
1.] i=1; so (1%2==0) this condition is false means it is odd number and it will get stored 
    in var(x).
2.] Now as per iteration the i becomes i=2; so (2%2==0) this condition is true so we will
    skip that value as continue is written over there if this condition satisfies.

-->
</body>
</html>
