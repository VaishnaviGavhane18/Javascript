<body>
    <script>

//Qno 18: Write a program to print numbers from 1 to 100 but skip the number 50 ?


function MyFunction() {
 let result="";

 for( let i=1; i<=100; i++) {
    if( i === 50) {
       continue;
    }
    
    else {
        result= result+i + "<br>";
        console.log(result)
    }
   
 }
  document.getElementById("demo").innerHTML= result;
}

    </script>
        <button onclick="MyFunction()">click me</button>
    <p id="demo"></p>   

</body>
</html>
