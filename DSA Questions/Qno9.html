     let num=[1, 2, 8, 7, 8, 3, 2, 8];

     function removeDuplicates(num) {
        let uniqueNum = [];

        for (let i = 0; i < num.length; i++) {
            if (!uniqueNum.includes(num[i])) {
                uniqueNum.push(num[i]);
            }
        }
        return uniqueNum;
     }  
     console.log(removeDuplicates(num));
