<script>
    // Qno19: Write a JavaScript program to separate the numbers and characters from an array and display them in a single string.
    let arr=['b',8,9,'c',2,'vanu'];

    str='';
    num='';
    for(let i=0;i<arr.length;i++) {
    if(typeof arr[i]==='number') {
       num+= arr[i] +'';
        
    }  
    
    else {
         str += arr[i] + ' ';
    
    }
    }
    
    console.log(num);
    console.log(str);
</script>
