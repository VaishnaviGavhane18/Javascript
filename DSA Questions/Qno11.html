    <script>

// Q.] Write a JavaScript program that prompts the user to enter a number and keeps prompting until the user enters the correct number (e.g., 18). Once the correct number is entered, display a congratulatory message.

         let gamenumber=18;
         var number = prompt("Enter a number:");

         while ( number != gamenumber) {
            number = prompt("Enter a number:");
         }
       
            console.log (alert(" congratulations you won!"));
        
    </script>

 <!-- 
 EXPLANATION :
 1.] We have a variable gamenumber which is assigned the value 18.
 2.] We use the prompt function to ask the user to enter a number and store it in the variable 'number'.
 3.] We use a while loop to check if the number entered by the user is not equal to gamenumber. If it is not equal, we prompt the user to 
     enter a number again.
 4.] Once the user enters the correct number (18), the loop will exit and we will display a congratulatory message using alert.
-->
</body>
