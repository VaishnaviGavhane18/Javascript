    <script>

let num=[1,4,6,3,7,5,];

for ( let i=0 ; i < num.length ; i++ ) {
    
    if( num[i] % 2 === 0 ) {
      console.log(num[i] + " is even number");
    }

    else {
       console.log(num[i] + " is odd number");
    }
    }

console.log(num);

    </script>
