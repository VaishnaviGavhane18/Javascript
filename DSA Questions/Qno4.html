<body>
    <script>

// Qno 1: Write a program to print the multiplication table of 2 using for loop ?
        let num= 2;

        for ( let i=1; i<=10; i++) {
            console.log("2 * " + i + " = " + (num * i));
        }

        // Explanation:
        // we have used (num * i) and not (num*[i]) because we have not used array here .
        // we have already taken number 2 in num variable. //(let num=2) 

    </script>
</body>
